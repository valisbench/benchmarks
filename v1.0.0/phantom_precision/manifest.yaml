contact: "david.lundblad@gmail.com"

dataset:
  wedge: "phantom_precision"
  case_count: 500
  cases_file: "v1.0.0-phantom_precision/cases.jsonl"
  cases_sha256: "90fa3fa80b981d4892a8510895e85e539f774d43e29220c1ce6b7c459f405494"

roster:
  - provider: "anthropic"
    model_id: "claude-opus-4-7"
    sampling:
      temperature: 0.0
      top_p: 1.0
      seed: 42
      max_tokens: 1024
  - provider: "openai"
    model_id: "gpt-5.5-2026-04-23"
    sampling:
      temperature: 0.0
