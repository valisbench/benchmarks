model_id_provenance: |
  Each model_id was verified against the provider's live model-listing endpoint
  on 2026-05-21. Providers expose stability differently:
  - OpenAI publishes dated snapshots for current frontier models; we pin
    gpt-5.5-2026-04-23, the snapshot underlying the gpt-5.5 alias on this date.
  - Anthropic publishes dated snapshots only for retired models; current
    frontier models (4.7, 4.6) are alias-only. claude-opus-4-7 is the
    canonical provider ID; no dated snapshot is exposed.
  - Google publishes the 3.1-pro tier as preview (gemini-3.1-pro-preview); no
    GA 3.x-pro exists at publication time. The preview alias carries
    deprecation risk; if Google retires the alias before the run completes,
    the manifest will be republished as 1.0.1 with the substituted ID, the
    substitution disclosed, and both manifests anchored.

scoring:
  scorer: "boundary_condition_omission_v1"
  metric: "f1"
  rubric: |
    Set-based F1 against the ground-truth boundary conditions (BCs) encoded
    for each case. The model's task in production: given a claim, list the
    things a careful reviewer should check before relying on the claim. The
    scorer parses the response as a list of free-text items and matches each
    item against the case's ground-truth BCs and distractors.

    Matching method (PRE-REGISTERED, locked): deterministic keyword-group
    matching. Each BC carries a list of "keyword_groups" -- each group is a
    set of concept-alternatives (synonyms/paraphrases for one BC aspect).
    A candidate item matches a BC iff for every group, the candidate
    (normalized: lowercase, punctuation collapsed to space, whitespace
    collapsed) contains at least one alternative from that group. The
    normalization is locked: no stemming, no lemmatization, no LLM-judging.

    Why deterministic keyword-group matching rather than embedding cosine
    or LLM-judge:
    - Reproducibility from a clean machine with no VALIS infrastructure.
      A third party verifying a published result must not need API access
      or a pinned huggingface model snapshot. Keyword-group matching needs
      only Python stdlib.
    - The ground-truth BC list and the matching rule are co-pre-registered:
      the keyword groups are part of the dataset under the same SHA256 the
      manifest commits to. Auditors can inspect both together.
    - Trade-off: keyword-group matching is stricter than a perfectly tuned
      embedding matcher would be. A model output that paraphrases the BC
      using novel synonyms not represented in the keyword group will miss.
      Keyword groups are maintained as paraphrase surfaces evolve; any
      change is a new manifest version. This is documented as a v1
      methodological tradeoff; v2 may layer in a secondary embedding pass
      and report both metrics in parallel.

    Boundary conditions within a family share concept terms (e.g.,
    "baseline" and "segment" both appear in multiple BCs' keyword groups).
    A single candidate covering multiple BC concepts can therefore satisfy
    multiple BCs simultaneously. This inflates recall for models whose
    coverage concentrates in shared concept clusters. The pre-registered
    choice is to accept this recall-inflation because the design hypothesis
    (H1) keys on recall falling below 0.4 in tier 3; recall inflation makes
    H1 harder to confirm, raising the falsifiability bar in the doctrine-
    aligned direction.

    Free-text model output is parsed upstream of this scorer. The harness
    prompts the model to return a numbered or bulleted list and parses
    line-by-line: one line equals one candidate item, with leading bullets/
    numbers/punctuation stripped. Long prose responses are split on sentence
    boundaries. An empty list is treated as zero true-positives (not as a
    refusal). The scorer's contract begins with `Sequence[str]` candidates;
    the parser sits between the provider and the scorer.

    Per case:
    - tp = number of BCs covered by at least one candidate
    - fn = number of BCs not covered by any candidate
    - fp = (number of distractors flagged) + (number of unmatched candidates)
    - precision = tp / (tp + fp)
    - recall    = tp / (tp + fn)
    - f1        = 2 * precision * recall / (precision + recall)

    Recall is the headline metric for the pre-registered H1 hypothesis;
    precision is reported alongside. Distractor-match rate is reported as
    a secondary diagnostic for over-flag patterns. Refusals are scored as
    a separate outcome category and excluded from the F1 calculation; per-
    roster refusal rates and the full seven-category outcome breakdown
    are reported alongside the score.

hypotheses:
  - id: "H1"
    statement: "Set recall on ground-truth boundary conditions will fall below 0.4 on at least one frontier model in tier 3 (claim has implicit assumptions that are easy to miss; 7-8 BCs and 5 topically-overlapping distractors)."

refusal_policy: |
  Refusals are scored as a separate outcome category, not as wrong answers.
  A refusal flag is set when the model declines to evaluate the claim; F1
  is computed only over non-refused cases. Refusal rates are surfaced
  alongside the score so that high-refusal regimes cannot game the metric.
  All seven outcome categories (response, refusal, partial_response,
  error_timeout, error_rate_limit, error_other, malformed) are reported in
  the results bundle.

failure_publication_commitment: |
  Null and unfavorable results publish on the same methodology page as
  positive results. There is no scenario in which VALIS scores a model and
  withholds the finding because the result is uncomfortable. This commitment
  is anchored to the same Bitcoin block as the manifest.

spot_check_panel_outcome: |
  Spot-check panel (50 cases, three independent frontier reviewers):
    - Claude Opus 4.7 (Anthropic, undated alias)
    - GPT-5.5, snapshot gpt-5.5-2026-04-23 (OpenAI, via codex CLI)
    - Gemini 3.1 Pro Preview (Google)

  Gate: zero unanimous-fail cases across the panel. A 'unanimous fail' is a case
  that all three reviewers fail under the wedge's rubric; this would indicate a
  concrete dataset construction error. The gate is met iff zero such cases exist
  on the 50-case sample.

  Panel outcome for this wedge:
    - Unanimous pass: 29/50
    - Majority pass (2 of 3): 12/50
    - Majority fail (1 of 3): 9/50 (rubric-interpretation divergence)
    - Unanimous fail (0 of 3): 0/50

  Gate verdict: PASSED (0 unanimous fails).

  The 9 majority-fail cases reflect substantive disagreement between
  frontier models on rubric interpretation -- not dataset bugs. The cases are
  published verbatim in v1.0.0-SPOT_CHECK_PANEL.md alongside each reviewer's
  rationale, so the boundary of the rubric is itself part of the published
  artifact. This is a doctrinal commitment: where the rubric admits two reads,
  the publication shows the disagreement rather than hiding it.

  Reviewer verdict files (per wedge):
    spot_check_opus47_verdicts.md
    spot_check_gpt55_verdicts.md
    spot_check_gemini31pro_verdicts.md

  Disagreement disclosure artifact (cross-wedge):
    ../CROSS_REVIEWER_DISAGREEMENT_v1.0.0.md

anchoring:
  primary: "sigstore-rekor"
  secondary: "opentimestamps"
  cosign_mode: "keyless-oidc"
